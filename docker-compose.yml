version: '3.8'

services:
  # PIA VPN - US Florida (Miami)
  vpn-florida:
    image: qmcgaw/gluetun
    container_name: vpn-florida
    cap_add:
      - NET_ADMIN
    environment:
      - VPN_SERVICE_PROVIDER=private internet access
      - OPENVPN_USER=${PIA_USERNAME}
      - OPENVPN_PASSWORD=${PIA_PASSWORD}
      - SERVER_REGIONS=US Florida
      - FIREWALL_OUTBOUND_SUBNETS=172.22.0.0/16
      - HTTPPROXY=on
    networks:
      vpn_network:
        ipv4_address: 172.22.0.10
    ports:
      - "8881:8888"  # HTTP proxy port
    restart: unless-stopped
    mem_limit: 256m
    memswap_limit: 256m
    cpus: 0.50
    init: true
    healthcheck:
      interval: 5m
      timeout: 30s
      start_period: 40s
      retries: 3

